name: Build IPA & Upload to App Store
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode_26.app 2>/dev/null || true
          xcodebuild -version
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - name: Install Gradle 8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-8.10.2/bin" >> $GITHUB_PATH
      - name: Build iOS Framework
        run: gradle :composeApp:linkReleaseFrameworkIosArm64
      - name: Install Tools
        run: |
          brew install xcodegen
          gem install xcodeproj -N
      - name: Generate
        run: |
          xcodegen generate
          ruby -e "require 'xcodeproj'; p = Xcodeproj::Project.open('ADHD Focus.xcodeproj'); p.targets.each do |t|; t.build_configurations.each do |c|; c.build_settings['CODE_SIGN_STYLE'] = 'Manual'; c.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'; c.build_settings['DEVELOPMENT_TEAM'] = 'S45CCRJ5NS'; c.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'AllApps_AppStore_Distribution'; end; end; p.save; puts 'OK'; end"
      - name: Cert
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" /tmp/ci.keychain
          security default-keychain -s /tmp/ci.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" /tmp/ci.keychain
          security import /tmp/cert.p12 -k /tmp/ci.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" /tmp/ci.keychain
          security list-keychain -d user -s /tmp/ci.keychain
      - name: Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/54bee6da-55df-4b38-96bc-3d554f1624a5.mobileprovision
      - name: Archive
        run: xcodebuild archive -project "ADHD Focus.xcodeproj" -scheme iosApp -configuration Release -archivePath /tmp/app.xcarchive -allowProvisioningUpdates
      - name: Export
        run: xcodebuild -exportArchive -archivePath /tmp/app.xcarchive -exportPath /tmp/IPA -exportOptionsPlist exportOptions.plist -allowProvisioningUpdates
      - name: Upload
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ipa=          if [ -n "\" ]; then xcrun altool --upload-app -f "\" -u "\" -p "\" --type ios; else echo "No IPA"; exit 1; fi
      - uses: actions/upload-artifact@v4
        with:
          name: ADHDFocusPro-IPA
          path: /tmp/**/*.ipa
